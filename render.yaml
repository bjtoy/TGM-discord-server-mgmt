# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Or update existing services manually using the settings below.
#
# Set these secrets in Render (Environment), never in this file:
#   SESSION_SECRET, DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET,
#   DISCORD_TOKEN, DISCORD_GUILD_ID, ADMIN_DISCORD_IDS
#
# Verify locally before deploy:
#   cd backend && npm run verify-env
#   cd dashboard && npm run verify-env
#
# Post-deploy health check:
#   GET https://<backend-host>/api/health

databases:
  - name: underbosshq-db
    plan: free
    databaseName: underbosshq
    user: underbosshq

services:
  # Backend API + Discord bot worker (bot starts when DISCORD_TOKEN is set)
  - type: web
    name: tgm-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:deploy
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: underbosshq-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://tgm-dashboard.onrender.com
      - key: DISCORD_CALLBACK_URL
        value: https://tgm-backend.onrender.com/api/auth/callback

  # React dashboard (static site)
  - type: web
    name: tgm-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tgm-backend.onrender.com
